<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BINANCE SCREENER</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lightweight-charts/4.1.3/lightweight-charts.standalone.production.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

:root {
  --bg:          #0a0c0f;
  --bg2:         #0f1217;
  --bg3:         #141820;
  --border:      #1e2430;
  --border2:     #252d3d;
  --text:        #c8d0e0;
  --text-dim:    #5a6480;
  --text-bright: #e8edf8;
  --green:       #00c896;
  --green-dim:   rgba(0,200,150,0.12);
  --red:         #ff4560;
  --red-dim:     rgba(255,69,96,0.12);
  --accent:      #3d7eff;
  --accent-dim:  rgba(61,126,255,0.15);
  --gold:        #f5a623;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:var(--bg);
  color:var(--text);
  font-family:'IBM Plex Sans',sans-serif;
  height:100vh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* ── HEADER ── */
header {
  display:flex; align-items:center; justify-content:space-between;
  padding:0 16px; height:52px;
  background:var(--bg2); border-bottom:1px solid var(--border);
  flex-shrink:0; gap:12px;
}
.logo {
  font-family:'IBM Plex Mono',monospace;
  font-size:13px; font-weight:600; letter-spacing:.15em;
  color:var(--gold); display:flex; align-items:center; gap:8px; white-space:nowrap;
}
.logo-dot { width:6px; height:6px; border-radius:50%; background:var(--gold); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

.header-controls { display:flex; align-items:center; gap:8px; flex:1; max-width:520px; }

.search-wrap { position:relative; flex:1; }
.search-icon {
  position:absolute; left:10px; top:50%; transform:translateY(-50%);
  color:var(--text-dim); font-size:12px; pointer-events:none;
}
#searchInput {
  width:100%;
  background:var(--bg3); border:1px solid var(--border); border-radius:6px;
  padding:7px 10px 7px 28px;
  color:var(--text-bright); font-family:'IBM Plex Mono',monospace; font-size:12px;
  outline:none; transition:border-color .2s;
}
#searchInput:focus { border-color:var(--accent); }
#searchInput::placeholder { color:var(--text-dim); }

.sort-btns { display:flex; gap:4px; }
.sort-btn {
  padding:5px 9px; background:var(--bg3); border:1px solid var(--border);
  border-radius:5px; color:var(--text-dim);
  font-family:'IBM Plex Mono',monospace; font-size:11px;
  cursor:pointer; transition:all .15s; white-space:nowrap;
}
.sort-btn:hover { color:var(--text); border-color:var(--border2); }
.sort-btn.active { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }

.status-badge {
  display:flex; align-items:center; gap:6px;
  font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--text-dim); white-space:nowrap;
}
.live-dot { width:5px; height:5px; border-radius:50%; background:var(--green); animation:pulse 1.5s infinite; }

/* ── CATEGORY TABS ── */
.category-bar {
  display:flex; align-items:center; gap:6px;
  padding:6px 12px; border-bottom:1px solid var(--border);
  background:var(--bg); flex-shrink:0; overflow-x:auto;
}
.category-bar::-webkit-scrollbar { height:3px; }
.category-bar::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
.cat-btn {
  padding:4px 12px; background:transparent; border:1px solid var(--border);
  border-radius:20px; color:var(--text-dim);
  font-family:'IBM Plex Mono',monospace; font-size:11px;
  cursor:pointer; transition:all .15s; white-space:nowrap;
}
.cat-btn:hover { color:var(--text); border-color:var(--border2); }
.cat-btn.active { border-color:var(--gold); color:var(--gold); background:rgba(245,166,35,.1); }

/* ── LAYOUT ── */
.main { display:flex; flex:1; overflow:hidden; }

/* ── SIDEBAR ── */
.sidebar {
  width:310px; min-width:310px;
  background:var(--bg2); border-right:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden;
}
.list-header {
  display:grid; grid-template-columns:1fr 88px 66px 82px;
  padding:7px 12px;
  font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--text-dim);
  letter-spacing:.06em; border-bottom:1px solid var(--border);
  background:var(--bg); flex-shrink:0;
}
.list-header .col-r { text-align:right; }
.coin-list { overflow-y:auto; flex:1; }
.coin-list::-webkit-scrollbar { width:3px; }
.coin-list::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
.coin-row {
  display:grid; grid-template-columns:1fr 88px 66px 82px;
  align-items:center; padding:7px 12px;
  cursor:pointer; border-bottom:1px solid rgba(30,36,48,.5);
  transition:background .1s; font-family:'IBM Plex Mono',monospace;
}
.coin-row:hover { background:var(--bg3); }
.coin-row.active { background:var(--accent-dim); border-left:2px solid var(--accent); padding-left:10px; }
.coin-name { display:flex; flex-direction:column; gap:1px; }
.coin-symbol { font-size:12px; font-weight:600; color:var(--text-bright); }
.coin-base   { font-size:10px; color:var(--text-dim); }
.coin-price  { text-align:right; font-size:11.5px; color:var(--text-bright); font-weight:500; }
.coin-change { text-align:center; font-size:10.5px; font-weight:600; padding:2px 4px; border-radius:3px; }
.coin-change.up { color:var(--green); background:var(--green-dim); }
.coin-change.dn { color:var(--red);   background:var(--red-dim); }
.coin-vol    { text-align:right; font-size:10.5px; color:var(--text-dim); }
.list-empty  { padding:36px 16px; text-align:center; font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--text-dim); opacity:.6; }

/* ── CHART AREA ── */
.chart-area { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.chart-toolbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:0 16px; height:48px;
  border-bottom:1px solid var(--border);
  flex-shrink:0; background:var(--bg2); gap:12px;
}
.chart-symbol       { display:flex; align-items:baseline; gap:10px; }
.chart-symbol-name  { font-family:'IBM Plex Mono',monospace; font-size:16px; font-weight:600; color:var(--text-bright); letter-spacing:.05em; }
.chart-price-display{ font-family:'IBM Plex Mono',monospace; font-size:14px; color:var(--green); font-weight:500; }
.chart-change-display{ font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:600; }
.chart-change-display.up { color:var(--green); }
.chart-change-display.dn { color:var(--red); }

.tf-btns { display:flex; gap:4px; }
.tf-btn {
  padding:5px 11px; background:transparent; border:1px solid var(--border);
  border-radius:4px; color:var(--text-dim);
  font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.05em;
  cursor:pointer; transition:all .15s;
}
.tf-btn:hover { color:var(--text); border-color:var(--border2); }
.tf-btn.active { background:var(--accent-dim); border-color:var(--accent); color:var(--accent); }

.chart-stats { display:flex; gap:18px; align-items:center; }
.stat-item   { display:flex; flex-direction:column; gap:1px; align-items:flex-end; }
.stat-label  { font-size:9px; color:var(--text-dim); letter-spacing:.08em; font-family:'IBM Plex Mono',monospace; }
.stat-value  { font-size:11px; font-family:'IBM Plex Mono',monospace; color:var(--text); font-weight:500; }

#chartContainer {
  flex:1; position:relative; background:var(--bg);
  /* 명시적 min-height 보장 */
  min-height:0;
}
.placeholder {
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:12px; color:var(--text-dim);
}
.placeholder-icon { font-size:40px; opacity:.3; }
.placeholder-text { font-family:'IBM Plex Mono',monospace; font-size:13px; opacity:.5; letter-spacing:.1em; }
.loading-overlay {
  position:absolute; inset:0; background:rgba(10,12,15,.85);
  display:flex; align-items:center; justify-content:center;
  z-index:10; backdrop-filter:blur(2px);
}
.spinner {
  width:28px; height:28px;
  border:2px solid var(--border2); border-top-color:var(--accent);
  border-radius:50%; animation:spin .7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-dot"></div>BINANCE SCREENER</div>
  <div class="header-controls">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input id="searchInput" type="text" placeholder="BTC, ETH, SOL...">
    </div>
    <div class="sort-btns">
      <button class="sort-btn active" data-sort="vol">거래량↓</button>
      <button class="sort-btn" data-sort="change">변화율</button>
      <button class="sort-btn" data-sort="price">가격</button>
    </div>
  </div>
  <div class="status-badge">
    <div class="live-dot"></div>
    <span id="statusText">로딩 중...</span>
  </div>
</header>

<!-- 카테고리 탭 -->
<div class="category-bar" id="categoryTabs"></div>

<div class="main">
  <!-- 사이드바 -->
  <div class="sidebar">
    <div class="list-header">
      <span>심볼</span>
      <span class="col-r">현재가</span>
      <span class="col-r">24H%</span>
      <span class="col-r">거래대금</span>
    </div>
    <div class="coin-list" id="coinList">
      <div class="list-empty">로딩 중...</div>
    </div>
  </div>

  <!-- 차트 영역 -->
  <div class="chart-area">
    <div class="chart-toolbar">
      <div class="chart-symbol">
        <span class="chart-symbol-name" id="chartSymbolName">—</span>
        <span class="chart-price-display" id="chartPriceDisplay"></span>
        <span class="chart-change-display" id="chartChangeDisplay"></span>
      </div>
      <div class="tf-btns">
        <button class="tf-btn" data-tf="5m">5M</button>
        <button class="tf-btn active" data-tf="15m">15M</button>
        <button class="tf-btn" data-tf="1h">1H</button>
        <button class="tf-btn" data-tf="4h">4H</button>
        <button class="tf-btn" data-tf="1d">1D</button>
      </div>
      <div class="chart-stats" id="chartStats"></div>
    </div>

    <div id="chartContainer">
      <div class="placeholder" id="placeholder">
        <div class="placeholder-icon">◈</div>
        <div class="placeholder-text">← 좌측 목록에서 코인을 선택하세요</div>
      </div>
    </div>
  </div>
</div>

<!-- JS 모듈 로드 순서 중요 -->
<script src="js/globals.js"></script>
<script src="js/categories.js"></script>
<script src="js/data.js"></script>
<script src="js/chart.js"></script>
<script src="js/ui.js"></script>

</body>
</html>
